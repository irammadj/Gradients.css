<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        background-color: #f7fafc;
      }

      .card {
        width: 350px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.1);
        padding: 30px;
        text-align: center;
      }

      .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6b35, #8b5cf6);
        margin: 0 auto 16px auto;
        color: white;
        font-size: 40px;
        line-height: 80px;
        text-align: center;
        object-fit: cover;
        display: block;
      }
      .name {
        font-size: 20px;
        font-weight: 700;
        color: #1a202c;
        margin-bottom: 8px;
      }

      .stars {
        color: #ffb800;
        font-size: 18px;
        letter-spacing: 4px;
        margin-bottom: 16px;
      }

      .text {
        font-size: 15px;
        line-height: 1.5;
        color: #4a5568;
        margin-bottom: 24px;
      }

      .btn {
        background: linear-gradient(135deg, #ff6b35, #8b5cf6);
        color: white;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 20px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        width: 100%;
      }

      .btn:hover {
        background: linear-gradient(135deg, #e55a2b, #7c3aed);
      }

      .card:hover {
        box-shadow: 0px 12px 28px rgba(0, 0, 0, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        class="avatar"
        src="https://t4.ftcdn.net/jpg/07/12/03/23/360_F_712032375_LUT0pqBrk1C19Tb9ifz8aOkrJgTrdQCz.jpg"
        alt="Emily Chen Picture"
      />
      <div class="name">Emily Chen</div>

      <div class="stars">★★★★★</div>

      <div class="text">
        Finally, CSS that makes sense! I built my first card in 20 minutes.
      </div>

      <div>
        <button class="btn">Read Full Review</button>
      </div>
    </div>
  </body>
</html>
